<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studioform — Concept Homepage</title>

  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      color: white;
      height: 100vh;
      background: #000;
    }

    /* Navigation */
    nav {
      display: flex;
      justify-content: flex-end;
      gap: 2rem;
      padding: 1.5rem 3rem;
      font-size: 1rem;
      position: absolute;
      width: 100%;
      top: 0;
      z-index: 10;
    }

    nav a {
      color: white;
      text-decoration: none;
      opacity: 0.9;
    }

    nav a:hover {
      opacity: 1;
    }

    .section {
        width: 100%;
        min-height: 100vh;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        position: relative;
    }

    .one  { background-image: url('Background1.png'); }
    .two  { background-image: url('Background2.png'); height: 101vh; }
    .three { background-image: url('Background3.png'); height: 101vh; }

    /* Studioform top-left */
    .hero h1 {
        position: absolute;
        top: 0px;
        left: 200px;
        color: #fffcf2;
        font-size: 40px;
        letter-spacing: 2px;
    }

    /* Paragraph bottom-left */
    .hero p {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      z-index: 2;
      max-width: 500px;
      font-size: 1.2rem;
      line-height: 1.6;
      opacity: 0.95;
    }
  </style>
</head>

<body>

  <nav>
    <a href="#">Work</a>
    <a href="#">Index</a>
    <a href="#">About</a>
    <a href="#">Blog</a>
    <a href="#">Contact</a>
  </nav>

  <section class="hero">
    <h1>Studioform®</h1>

    <p>
      We believe design is a dialogue of clarity and expression.
      Our philosophy values adaptive systems, resonant visuals,
      and ideas that endure across cultures and time.
    </p>
  </section>

</body>
</html>
